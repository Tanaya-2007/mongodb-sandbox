<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MongoDB Sandbox Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-card: #151c2c;
      --bg-active: #202b42;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-blue: #3b82f6;
      --accent-glow: #60a5fa;
      --accent-green: #10b981;
      --border-color: #24324f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Styles */
    .sidebar {
      width: 280px;
      background-color: #0f1422;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .brand {
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 1.2rem;
    }

    .brand-title {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .collections-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-left: 8px;
      font-weight: 700;
    }

    .collection-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .collection-item {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      color: var(--text-muted);
    }

    .collection-item:hover {
      background-color: var(--bg-card);
      color: var(--text-main);
      border-color: var(--border-color);
    }

    .collection-item.active {
      background-color: var(--bg-active);
      color: var(--accent-glow);
      border-color: var(--accent-blue);
      font-weight: 500;
    }

    .collection-icon {
      font-size: 1.1rem;
    }

    /* Main Console Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      height: 80px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background-color: rgba(15, 20, 34, 0.4);
      backdrop-filter: blur(12px);
    }

    .db-badge {
      display: flex;
      flex-direction: column;
    }

    .db-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .db-value {
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* Console Area */
    .console-area {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .doc-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }

    .doc-card:hover {
      border-color: var(--accent-blue);
    }

    .doc-header {
      padding: 14px 20px;
      background-color: rgba(25, 35, 58, 0.3);
      border-bottom: 1px solid var(--border-color);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent-glow);
      font-weight: 500;
    }

    .doc-body {
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    /* JSON highlighting */
    .json-key { color: #f28b82; }
    .json-string { color: #81c784; }
    .json-number { color: #ffb74d; }
    .json-boolean { color: #64b5f6; }
    .json-null { color: #b0bec5; }

    /* Empty States */
    .empty-state {
      margin: auto;
      text-align: center;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .empty-icon {
      font-size: 3.5rem;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.1), rgba(16, 185, 129, 0.1));
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      margin-bottom: 8px;
    }

    .empty-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
    }

    .empty-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .refresh-btn {
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .refresh-btn:hover {
      background-color: #2563eb;
    }

    /* Scrollbar override */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-blue);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-logo">🍃</div>
      <div class="brand-title">mongo-sandbox</div>
    </div>
    
    <div class="collections-section">
      <div class="section-title">Collections</div>
      <ul class="collection-list" id="collection-list">
        <!-- Dynamically populated -->
        <li style="color: var(--text-muted); padding: 8px; font-size: 0.9rem;">Loading...</li>
      </ul>
    </div>
  </div>

  <!-- Main Console -->
  <div class="main-content">
    <div class="header">
      <div class="db-badge">
        <span class="db-label">Target Database</span>
        <span class="db-value" id="db-name-header">...</span>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>Live Connection</span>
      </div>
    </div>

    <div class="console-area" id="console-area">
      <!-- Default Empty State -->
      <div class="empty-state">
        <div class="empty-icon">🗂️</div>
        <h3 class="empty-title">Welcome to Sandbox Console</h3>
        <p class="empty-desc">Choose a collection from the sidebar to view stored documents. As soon as your app performs its first database write, the collection will appear here.</p>
      </div>
    </div>
  </div>

  <script>
    // Extract database name from the URL path
    const pathParts = window.location.pathname.split('/');
    const dbName = pathParts[pathParts.length - 1];
    
    document.getElementById('db-name-header').innerText = dbName;
    
    let activeCollection = null;

    // Helper to format JSON with color highlighting
    function syntaxHighlight(json) {
      if (typeof json !== 'string') {
        json = JSON.stringify(json, undefined, 2);
      }
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
        let cls = 'json-number';
        if (/^"/.test(match)) {
          if (/:$/.test(match)) {
            cls = 'json-key';
          } else {
            cls = 'json-string';
          }
        } else if (/true|false/.test(match)) {
          cls = 'json-boolean';
        } else if (/null/.test(match)) {
          cls = 'json-null';
        }
        return '<span class="' + cls + '">' + match + '</span>';
      });
    }

    // Load Collection list
    async function loadCollections() {
      try {
        const res = await fetch(`/api/sandbox/${dbName}/collections`);
        const data = await res.json();
        
        const listEl = document.getElementById('collection-list');
        listEl.innerHTML = '';
        
        if (!data.success || data.collections.length === 0) {
          listEl.innerHTML = `<li style="color: var(--text-muted); padding: 8px; font-size: 0.9rem;">No collections found</li>`;
          return;
        }

        data.collections.forEach(col => {
          const li = document.createElement('li');
          li.className = 'collection-item';
          if (activeCollection === col) li.className += ' active';
          
          li.innerHTML = `<span class="collection-icon">📁</span> <span>${col}</span>`;
          li.onclick = () => selectCollection(col, li);
          listEl.appendChild(li);
        });
      } catch (err) {
        console.error('Error loading collections:', err);
      }
    }

    // Select and display collection documents
    async function selectCollection(col, element) {
      activeCollection = col;
      
      // Update active styling in sidebar
      document.querySelectorAll('.collection-item').forEach(el => el.classList.remove('active'));
      if (element) element.classList.add('active');

      const consoleArea = document.getElementById('console-area');
      consoleArea.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <h3 class="empty-title">Loading documents...</h3>
        </div>
      `;

      try {
        const res = await fetch(`/api/sandbox/${dbName}/collections/${col}`);
        const data = await res.json();
        
        if (!data.success || data.documents.length === 0) {
          consoleArea.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📄</div>
              <h3 class="empty-title">Empty Collection</h3>
              <p class="empty-desc">This collection exists but does not contain any documents.</p>
              <button class="refresh-btn" onclick="selectCollection('${col}')">Refresh</button>
            </div>
          `;
          return;
        }

        // Render documents
        let cardsHtml = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
          <h2 style="font-weight:600; font-size:1.4rem;">Documents in "${col}"</h2>
          <button class="refresh-btn" onclick="selectCollection('${col}')">Refresh Data</button>
        </div>
        <div class="card-list">`;
        
        data.documents.forEach(doc => {
          const docId = doc._id || 'Unknown ID';
          cardsHtml += `
            <div class="doc-card">
              <div class="doc-header">_id: ${docId}</div>
              <div class="doc-body">${syntaxHighlight(doc)}</div>
            </div>
          `;
        });
        cardsHtml += `</div>`;
        
        consoleArea.innerHTML = cardsHtml;
      } catch (err) {
        consoleArea.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">❌</div>
            <h3 class="empty-title">Failed to load data</h3>
            <p class="empty-desc">${err.message}</p>
          </div>
        `;
      }
    }

    // Initialize Page
    loadCollections();
    
    // Auto refresh collections list every 10 seconds in case they write from local app
    setInterval(loadCollections, 10000);
  </script>
</body>
</html>
